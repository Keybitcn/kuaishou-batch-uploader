<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Key 博客</title>
    <link rel="stylesheet" href="cms.css" />
    <style>
      #boot-hint { display: none; margin-top: 48px; }
      #admin-gate {
        display: none;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      #admin-gate form {
        width: min(360px, 100%);
        padding: 24px;
        border: 1px solid #333;
        border-radius: 8px;
        background: #141414;
      }
      #admin-gate h1 { margin: 0 0 8px; font-size: 20px; color: #f0f0f0; }
      #admin-gate p { margin: 0 0 16px; color: #a3a3a3; line-height: 1.6; }
      #admin-gate label { display: block; margin: 12px 0 6px; color: #a3a3a3; }
      #admin-gate label:first-of-type { margin-top: 0; }
      #admin-gate input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #333;
        border-radius: 6px;
        background: #111;
        color: #f0f0f0;
      }
      #admin-gate button {
        width: 100%;
        margin-top: 16px;
        padding: 10px 12px;
        border: 0;
        border-radius: 6px;
        background: #3b82f6;
        color: #fff;
        cursor: pointer;
      }
      #admin-gate .error { color: #ef4444; margin: 0 0 12px; min-height: 20px; }
      #admin-gate .hint { font-size: 13px; margin-top: 12px; }
      #totp-group { display: none; }
    </style>
  </head>
  <body data-theme="dark">
    <div id="admin-gate">
      <form id="gate-form">
        <h1>管理登录</h1>
        <p id="gate-intro">请先输入管理密码。</p>
        <p class="error" id="gate-error"></p>
        <label for="gate-password">密码</label>
        <input id="gate-password" name="password" type="password" autocomplete="current-password" required autofocus />
        <div id="totp-group">
          <label for="gate-totp">动态口令</label>
          <input id="gate-totp" name="totp" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" placeholder="Authenticator 6 位数字" />
        </div>
        <button type="submit">进入</button>
        <p class="hint"><a href="bind.html">绑定 Authenticator</a></p>
      </form>
    </div>
    <div id="boot-hint">
      <h1>加载失败</h1>
      <p id="boot-msg">正在加载配置…</p>
      <p><a href="setup.html">查看 OAuth 配置说明</a></p>
    </div>
    <script>window.CMS_MANUAL_INIT = true;</script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.1/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.4.0/dist/decap-cms.js"></script>
    <script>
      (async function () {
        var hint = document.getElementById("boot-hint");
        var msg = document.getElementById("boot-msg");
        var gate = document.getElementById("admin-gate");
        var gateForm = document.getElementById("gate-form");
        var gateError = document.getElementById("gate-error");
        var totpGroup = document.getElementById("totp-group");
        var gateIntro = document.getElementById("gate-intro");
        var totpInput = document.getElementById("gate-totp");

        async function getSessionState() {
          var res = await fetch("/session", { credentials: "include" });
          var data = await res.json().catch(function () { return {}; });
          return data;
        }

        function configureGate(totpRequired) {
          if (totpRequired) {
            totpGroup.style.display = "block";
            totpInput.required = true;
            gateIntro.textContent = "请输入管理密码和 Authenticator 动态口令。";
          }
        }

        async function ensureSession() {
          var state = await getSessionState();
          configureGate(!!state.totp_required);
          if (state.ok) return true;

          gate.style.display = "flex";
          return new Promise(function (resolve) {
            gateForm.addEventListener("submit", async function (event) {
              event.preventDefault();
              gateError.textContent = "";
              var body = {
                password: document.getElementById("gate-password").value,
                totp: totpInput.value || "",
              };
              var res = await fetch("/session", {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
              });
              var data = await res.json().catch(function () { return {}; });
              if (!res.ok) {
                gateError.textContent = data.message || "登录失败，请重试";
                configureGate(!!data.totp_required);
                return;
              }
              gate.style.display = "none";
              resolve(true);
            }, { once: false });
          });
        }

        try {
          await ensureSession();
          var res = await fetch("config.yml");
          if (!res.ok) throw new Error("无法读取 config.yml");
          var config = jsyaml.load(await res.text());
          config.load_config_file = false;
          config.backend.base_url = window.location.origin;
          config.backend.auth_endpoint = "auth";
          config.backend.site_domain = window.location.hostname;
          document.documentElement.setAttribute("data-theme", "dark");
          window.CMS.init({ config: config });
          hint.style.display = "none";
        } catch (err) {
          hint.style.display = "block";
          msg.textContent = err && err.message ? err.message : "未知错误";
        }
      })();
    </script>
  </body>
</html>
