backend:
  name: github
  repo: Keybitcn/akeyman
  branch: main
  squash_merges: true
  base_url: https://quna.fun
  auth_endpoint: auth

media_folder: public/uploads
public_folder: /uploads

locale: zh_Hans

slug:
  encoding: unicode
  clean_accents: true

collections:
  - name: site
    label: 网站设置
    files:
      - name: settings
        label: 基本信息
        file: content/site.json
        fields:
          - { label: 站点简称, name: name, widget: string, hint: "显示在状态栏等位置" }
          - { label: 页面标题, name: title, widget: string, hint: "浏览器标签页标题" }
          - { label: 站点描述, name: description, widget: text }
          - { label: 作者名, name: author, widget: string }
          - { label: 邮箱, name: email, widget: string, required: false, hint: "留空则不显示" }
          - { label: 头像, name: avatar, widget: image, hint: "可上传图片或填写路径" }

  - name: about
    label: 关于页面
    files:
      - name: about
        label: 关于内容
        file: content/about.json
        fields:
          - { label: 身份标签, name: role, widget: string, default: "博主" }
          - { label: 个人简介, name: bio, widget: text }

  - name: posts
    label: 文章
    label_singular: 文章
    folder: content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    identifier_field: title
    summary: "{{excerpt}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: 标题, name: title, widget: string }
      - label: 发布日期
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
      - { label: 摘要, name: excerpt, widget: text, hint: "显示在文章列表" }
      - { label: 标签, name: tags, widget: list, default: [] }
      - { label: 正文, name: body, widget: markdown }