<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久星球</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0a0a1f] text-white p-6">
  <h1 class="text-4xl font-bold text-center mb-8">长久星球</h1>
  <div class="max-w-2xl mx-auto">
    <div id="list" class="space-y-4"></div>
  </div>

  <script>
    try {
      firebase.initializeApp({ databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app" });
      const db = firebase.database().ref('longWishes');

      console.log("Firebase 初始化成功");

      db.on('value', snap => {
        console.log("收到数据，总条数:", snap.numChildren());
        const container = document.getElementById('list');
        container.innerHTML = '';
        snap.forEach(c => {
          const v = c.val();
          const div = document.createElement('div');
          div.className = 'bg-white/10 p-6 rounded-3xl';
          div.innerHTML = `<p>${v.text}</p><div class="text-xs text-gray-400 mt-2">❤️ ${v.likes||0}</div>`;
          container.appendChild(div);
        });
      });
    } catch(e) {
      console.error("错误:", e);
      document.getElementById('list').innerHTML = '<p class="text-red-400">加载失败: ' + e.message + '</p>';
    }
  </script>
</body>
</html>
