<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久许愿墙</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e1b4b); }
    .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(168,85,247,0.3); }
  </style>
</head>
<body class="min-h-screen text-white p-6 pb-32">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-6xl font-bold text-center mb-12">🌟 长久许愿墙 🌟</h1>
    <div id="wishList" class="space-y-8"></div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-slate-950/90 p-6 border-t border-purple-500">
    <div class="max-w-2xl mx-auto">
      <textarea id="message" rows="3" class="w-full bg-white/5 border border-purple-400 rounded-3xl p-6" placeholder="写下你的长久心愿..."></textarea>
      <button onclick="postWish()" class="mt-4 w-full bg-purple-600 py-6 rounded-3xl font-bold">✨ 许愿</button>
    </div>
  </div>

  <script>
    firebase.initializeApp({ databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app" });
    const db = firebase.database().ref('longWishes');

    function loadWishes() {
      db.orderByChild('likes').on('value', snap => {
        let html = '';
        const arr = [];
        snap.forEach(c => arr.push({id:c.key, ...c.val()}));
        arr.sort((a,b) => (b.likes||0) - (a.likes||0));
        arr.forEach(w => {
          html += `<div class="card p-8 rounded-3xl mb-6">
            <p class="text-[${18 + Math.min((w.likes||0)*2,32)}px]">${w.text}</p>
            <div class="mt-4 flex justify-between text-sm">
              <button onclick="likeWish('${w.id}')" class="text-pink-400">❤️ ${w.likes||0}</button>
              <span>${new Date(w.time).toLocaleDateString('zh-CN')}</span>
            </div>
          </div>`;
        });
        document.getElementById('wishList').innerHTML = html || '<p class="text-center py-20 text-gray-400">还没有心愿</p>';
      });
    }

    function postWish() {
      const t = document.getElementById('message').value.trim();
      if(t) db.push({text:t, time:Date.now(), likes:0});
      document.getElementById('message').value = '';
    }

    function likeWish(id) {
      db.child(id).child('likes').transaction(v => (v||0)+1);
    }

    loadWishes();
  </script>
</body>
</html>
