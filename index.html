<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久星球</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>body{background:linear-gradient(135deg,#0a0a1f,#1f1233)}.glass{background:rgba(255,255,255,0.1);backdrop-filter:blur(20px)}</style>
</head>
<body class="min-h-screen text-white p-6">
  <h1 class="text-5xl font-bold text-center mb-8">长久星球</h1>

  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-9">
      <div class="glass rounded-3xl p-6">
        <h2 class="text-2xl mb-6">最新心愿</h2>
        <div id="latest" class="space-y-4"></div>
      </div>
    </div>
    <div class="lg:col-span-3">
      <div class="glass rounded-3xl p-6">
        <h2 class="text-2xl mb-6">共鸣排行</h2>
        <div id="top" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    firebase.initializeApp({databaseURL:"https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app"});
    const db = firebase.database().ref('longWishes');

    db.on('value', snap => {
      let list = [];
      snap.forEach(c => list.push({id:c.key,...c.val()}));

      // 左侧全部最新
      document.getElementById('latest').innerHTML = list.sort((a,b)=>b.time-a.time).map(v=>`
        <div class="glass p-6 rounded-3xl"><p>${v.text}</p><div class="mt-3 text-sm">❤️ ${v.likes||0}</div></div>
      `).join('');

      // 右侧排行
      document.getElementById('top').innerHTML = list.sort((a,b)=>(b.likes||0)-(a.likes||0)).slice(0,10).map(v=>`
        <div class="glass p-6 rounded-3xl"><p>${v.text}</p><div class="mt-3 text-sm">❤️ ${v.likes||0}</div></div>
      `).join('');
    });
  </script>
</body>
</html>
