<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>愿望墙</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:linear-gradient(135deg,#0f172a,#1e2937)}</style>
</head>
<body class="min-h-screen text-white p-6">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-8">✨ 愿望墙 ✨</h1>
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-8">
      <textarea id="message" rows="3" class="w-full bg-white/10 border border-white/20 rounded-xl p-4 text-white placeholder-gray-400" placeholder="写下你的愿望..."></textarea>
      <button onclick="postWish()" class="mt-4 bg-violet-500 hover:bg-violet-600 px-8 py-3 rounded-xl font-medium w-full">发布愿望</button>
    </div>
    <div id="wishList" class="space-y-4"></div>
    <div class="fixed bottom-6 right-6">
      <button onclick="adminLogin()" class="bg-white/10 hover:bg-white/20 px-5 py-2 rounded-full text-sm">👨‍💼 管理员</button>
    </div>
  </div>

  <script>
    const ADMIN_USER="admin", ADMIN_PASS="admin123"; let isAdmin=false;
    function loadWishes(){const w=JSON.parse(localStorage.getItem('wishes')||'[]');document.getElementById('wishList').innerHTML=w.map((wish,i)=>`<div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl p-6"><p class="text-lg mb-3">${wish.text}</p><div class="flex justify-between text-sm text-gray-400"><span>${new Date(wish.time).toLocaleString('zh-CN')}</span>${isAdmin?`<button onclick="deleteWish(${i})" class="text-red-400">删除</button>`:''}</div></div>`).join('');}
    function postWish(){const t=document.getElementById('message').value.trim();if(!t)return;const w=JSON.parse(localStorage.getItem('wishes')||'[]');w.unshift({text:t,time:Date.now()});localStorage.setItem('wishes',JSON.stringify(w));document.getElementById('message').value='';loadWishes();}
    function deleteWish(i){if(!confirm('删除？'))return;const w=JSON.parse(localStorage.getItem('wishes')||'[]');w.splice(i,1);localStorage.setItem('wishes',JSON.stringify(w));loadWishes();}
    function adminLogin(){const u=prompt("用户名",ADMIN_USER),p=prompt("密码");if(u===ADMIN_USER&&p===ADMIN_PASS){isAdmin=true;alert('登录成功');loadWishes();}else alert('错误');}
    loadWishes();
  </script>
</body>
</html>
