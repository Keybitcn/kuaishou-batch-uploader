<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久许愿墙</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); }
    .card { transition: all 0.3s; }
    .card:hover { transform: scale(1.02); }
  </style>
</head>
<body class="min-h-screen text-white p-6 pb-32">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-8">🌟 长久许愿墙 🌟</h1>
    <div id="wishList" class="space-y-6"></div>
  </div>

  <!-- 发布区 -->
  <div class="fixed bottom-0 left-0 right-0 bg-slate-950/95 p-6 border-t border-purple-500">
    <div class="max-w-2xl mx-auto">
      <textarea id="message" rows="3" class="w-full bg-slate-900 border border-purple-500 rounded-3xl p-6 text-lg placeholder-gray-400" placeholder="写下你的长久心愿..."></textarea>
      <button onclick="postWish()" class="mt-4 w-full bg-gradient-to-r from-purple-600 to-pink-600 py-5 rounded-3xl font-bold text-xl">许愿</button>
    </div>
  </div>

  <button onclick="adminLogin()" class="fixed bottom-6 right-6 bg-white/10 px-6 py-3 rounded-full text-sm">👑 管理员</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDUMMY-PLACEHOLDER-KEY",   // ← 改成你的真实 apiKey
      authDomain: "changjiu-9280f.firebaseapp.com",
      databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "changjiu-9280f",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('longWishes');

    let isAdmin = false;
    const ADMIN = {u:"admin", p:"admin123"};
    let myPosts = JSON.parse(localStorage.getItem('myPosts') || '[]'); // 记录自己发的

    function loadWishes() {
      db.orderByChild('likes').on('value', snap => {
        const wishes = [];
        snap.forEach(child => wishes.push({id: child.key, ...child.val()}));
        wishes.sort((a,b) => (b.likes||0) - (a.likes||0));

        document.getElementById('wishList').innerHTML = wishes.map(w => `
          <div class="card bg-white/10 backdrop-blur-xl border border-purple-500 rounded-3xl p-8 mb-6">
            <p class="text-[${18 + Math.min((w.likes||0)*2, 32)}px] leading-relaxed">${w.text}</p>
            <div class="mt-6 flex justify-between text-sm text-gray-400">
              <button onclick="likeWish('${w.id}')" class="flex items-center gap-1 hover:text-pink-400">
                ❤️ ${w.likes || 0}
              </button>
              <span>${new Date(w.time).toLocaleDateString('zh-CN')}</span>
              ${(myPosts.includes(w.id) || isAdmin) ? 
                `<button onclick="deleteWish('${w.id}')" class="text-red-400 hover:text-red-500">删除</button>` : ''}
            </div>
          </div>
        `).join('');
      });
    }

    function postWish() {
      const text = document.getElementById('message').value.trim();
      if (!text) return alert("请输入心愿");
      
      const newPost = db.push({ text, time: Date.now(), likes: 0 });
      const postId = newPost.key;
      
      myPosts.push(postId);
      localStorage.setItem('myPosts', JSON.stringify(myPosts));
      
      document.getElementById('message').value = '';
      alert("✨ 心愿已许下");
    }

    function likeWish(id) {
      db.child(id).child('likes').transaction(v => (v || 0) + 1);
    }

    function deleteWish(id) {
      if (!confirm('确定删除这条心愿吗？')) return;
      db.child(id).remove();
      myPosts = myPosts.filter(p => p !== id);
      localStorage.setItem('myPosts', JSON.stringify(myPosts));
    }

    function adminLogin() {
      const u = prompt("管理员用户名", ADMIN.u);
      const p = prompt("管理员密码");
      if (u === ADMIN.u && p === ADMIN.p) {
        isAdmin = true;
        alert("✅ 管理员模式已开启（可删除所有）");
      } else alert("账号或密码错误");
    }

    loadWishes();
  </script>
</body>
</html>
