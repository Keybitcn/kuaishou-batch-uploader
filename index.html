<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久星球</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a1f, #1f1233); }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.15); }
  </style>
</head>
<body class="min-h-screen text-white p-6 pb-40">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-2 bg-gradient-to-r from-purple-300 to-pink-300 bg-clip-text text-transparent">长久星球</h1>
    <p class="text-center text-purple-300 mb-10">🌟 把心愿留在这里，长久陪伴</p>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- 左侧 80% -->
      <div class="lg:col-span-9">
        <div class="glass rounded-3xl p-6">
          <h2 class="text-2xl font-semibold mb-6">最新心愿</h2>
          <div id="latestList" class="space-y-6"></div>
        </div>
      </div>
      <!-- 右侧 20% -->
      <div class="lg:col-span-3">
        <div class="glass rounded-3xl p-6 sticky top-6">
          <h2 class="text-2xl font-semibold mb-6">🔥 共鸣排行</h2>
          <div id="topList" class="space-y-6"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部输入框 -->
  <div id="inputBar" class="fixed bottom-0 left-0 right-0 bg-black/70 border-t border-white/10 p-4 glass">
    <div class="max-w-4xl mx-auto">
      <textarea id="message" rows="1" class="w-full bg-transparent text-lg placeholder-gray-400 focus:outline-none resize-none" placeholder="写下你的长久心愿..."></textarea>
      <button onclick="postMessage()" class="mt-3 w-full bg-gradient-to-r from-purple-500 to-pink-500 py-4 rounded-2xl font-bold">许下心愿</button>
    </div>
  </div>

  <script>
    firebase.initializeApp({ databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app" });
    const db = firebase.database().ref('longWishes');
    let liked = JSON.parse(localStorage.getItem('liked') || '[]');

    function createCard(v, showTime) {
      const already = liked.includes(v.id);
      return `<div class="glass rounded-3xl p-7">
        <p class="text-lg">${v.text}</p>
        <div class="mt-6 flex justify-between text-sm">
          <button onclick="like('${v.id}')" class="${already?'text-pink-300 cursor-default':'text-pink-400 hover:text-pink-300'}">❤️ ${v.likes||0}</button>
          ${showTime ? `<span class="text-gray-400">${new Date(v.time).toLocaleString('zh-CN')}</span>` : ''}
        </div>
      </div>`;
    }

    function loadData() {
      db.on('value', snap => {
        let list = [];
        snap.forEach(c => list.push({id:c.key, ...c.val()}));

        document.getElementById('latestList').innerHTML = list.sort((a,b)=>b.time-a.time).map(v=>createCard(v,true)).join('') || '<p class="text-center py-20 text-gray-400">还没有心愿～</p>';
        document.getElementById('topList').innerHTML = list.sort((a,b)=>(b.likes||0)-(a.likes||0)).slice(0,10).map(v=>createCard(v,false)).join('');
      });
    }

    function postMessage() {
      const t = document.getElementById('message').value.trim();
      if(t) {
        db.push({text:t, time:Date.now(), likes:0});
        document.getElementById('message').value = '';
      }
    }

    function like(id) {
      if(liked.includes(id)) return;
      liked.push(id);
      localStorage.setItem('liked', JSON.stringify(liked));
      db.child(id).child('likes').transaction(v => (v||0)+1);
    }

    // 输入框自动展开
    const input = document.getElementById('message');
    input.addEventListener('focus', () => { input.rows = 3; });
    input.addEventListener('blur', () => { if(!input.value.trim()) input.rows = 1; });

    loadData();
  </script>
</body>
</html>
