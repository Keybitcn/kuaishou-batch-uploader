<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久许愿墙</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); }
    .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(168, 85, 247, 0.6); }
    .neon { text-shadow: 0 0 20px #a855f7, 0 0 40px #c026d3; }
  </style>
</head>
<body class="min-h-screen text-white p-6 pb-32">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-10 neon">🌟 长久许愿墙 🌟</h1>
    <p class="text-center text-purple-300 mb-8">许下的愿，永远留存</p>

    <!-- 许愿列表 -->
    <div id="wishList" class="space-y-6 mb-12"></div>

    <!-- 发布区 -->
    <div class="fixed bottom-0 left-0 right-0 bg-slate-950/95 backdrop-blur-2xl border-t border-purple-500 p-6">
      <div class="max-w-2xl mx-auto">
        <textarea id="message" rows="3" class="w-full bg-slate-900 border border-purple-500 rounded-3xl p-6 text-lg placeholder-gray-400 focus:outline-none" placeholder="写下你的长久心愿..."></textarea>
        <button onclick="postWish()" class="mt-4 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 w-full py-5 rounded-3xl font-bold text-xl flex items-center justify-center gap-3">
          <i class="fas fa-star"></i> 许愿
        </button>
      </div>
    </div>
  </div>

  <script>
    let isAdmin = false;
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "admin123";

    function loadWishes() {
      let wishes = JSON.parse(localStorage.getItem('longWishes') || '[]');
      wishes.sort((a, b) => (b.likes || 0) - (a.likes || 0));

      document.getElementById('wishList').innerHTML = wishes.map((w, i) => `
        <div class="card bg-white/10 backdrop-blur-xl border border-purple-500/30 rounded-3xl p-8">
          <p class="text-[${18 + Math.min((w.likes||0)*2, 32)}px] leading-relaxed mb-6">${w.text}</p>
          
          <div class="flex items-center justify-between text-sm text-gray-400">
            <div class="flex items-center gap-6">
              <button onclick="likeWish(${i})" class="flex items-center gap-1.5 hover:text-pink-400 transition-colors">
                <i class="fas fa-heart"></i> <span class="font-medium">${w.likes || 0}</span>
              </button>
              <span>${new Date(w.time).toLocaleDateString('zh-CN')}</span>
            </div>
            ${isAdmin ? `<button onclick="deleteWish(${i})" class="text-red-400 hover:text-red-500"><i class="fas fa-trash"></i></button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function postWish() {
      const text = document.getElementById('message').value.trim();
      if (!text) return alert("写下你的心愿再许愿");
      
      let wishes = JSON.parse(localStorage.getItem('longWishes') || '[]');
      wishes.unshift({ text, time: Date.now(), likes: 0 });
      localStorage.setItem('longWishes', JSON.stringify(wishes));
      
      document.getElementById('message').value = '';
      loadWishes();
      alert("✨ 心愿已许下，将长久留存");
    }

    function likeWish(i) {
      let wishes = JSON.parse(localStorage.getItem('longWishes') || '[]');
      wishes[i].likes = (wishes[i].likes || 0) + 1;
      localStorage.setItem('longWishes', JSON.stringify(wishes));
      loadWishes();
    }

    function deleteWish(i) {
      if (!confirm('确定删除这条心愿？')) return;
      let wishes = JSON.parse(localStorage.getItem('longWishes') || '[]');
      wishes.splice(i, 1);
      localStorage.setItem('longWishes', JSON.stringify(wishes));
      loadWishes();
    }

    function adminLogin() {
      const u = prompt("管理员用户名", ADMIN_USER);
      const p = prompt("管理员密码");
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        isAdmin = true;
        alert("✅ 管理员已登录");
        loadWishes();
      } else alert("账号或密码错误");
    }

    loadWishes();
  </script>
</body>
</html>
