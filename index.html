<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久许愿墙</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>body{background:linear-gradient(135deg,#0f172a,#1e2937)}</style>
</head>
<body class="min-h-screen text-white p-6 pb-32">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-8">🌟 长久许愿墙 🌟</h1>
    <div id="wishList" class="space-y-6"></div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-slate-950/95 p-6 border-t border-purple-500">
    <div class="max-w-2xl mx-auto">
      <textarea id="message" rows="3" class="w-full bg-slate-900 border border-purple-500 rounded-3xl p-6" placeholder="写下你的长久心愿..."></textarea>
      <button onclick="postWish()" class="mt-4 w-full bg-purple-600 py-5 rounded-3xl font-bold">许愿</button>
    </div>
  </div>

  <button onclick="adminLogin()" class="fixed bottom-6 right-6 bg-white/10 px-6 py-3 rounded-full">👑</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDUMMY", // ← 改成你的真实 apiKey
      databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('longWishes');

    let isAdmin = false;
    let myPosts = JSON.parse(localStorage.getItem('myPosts')||'[]');

    function loadWishes() {
      db.orderByChild('likes').on('value', s => {
        let list = [];
        s.forEach(c => list.push({id:c.key,...c.val()}));
        list.sort((a,b)=>(b.likes||0)-(a.likes||0));
        document.getElementById('wishList').innerHTML = list.map(w=>`
          <div class="bg-white/10 p-8 rounded-3xl mb-6">
            <p class="text-[${18+Math.min((w.likes||0)*2,32)}px]">${w.text}</p>
            <div class="mt-4 flex justify-between">
              <button onclick="likeWish('${w.id}')" class="text-pink-400">❤️ ${w.likes||0}</button>
              <span>${new Date(w.time).toLocaleDateString()}</span>
              ${(myPosts.includes(w.id)||isAdmin)?`<button onclick="deleteWish('${w.id}')" class="text-red-400">删</button>`:''}
            </div>
          </div>
        `).join('');
      });
    }

    function postWish() {
      const t = document.getElementById('message').value.trim();
      if(!t) return;
      const np = db.push({text:t, time:Date.now(), likes:0});
      myPosts.push(np.key);
      localStorage.setItem('myPosts', JSON.stringify(myPosts));
      document.getElementById('message').value = '';
    }

    function likeWish(id){ db.child(id).child('likes').transaction(v=>(v||0)+1); }
    function deleteWish(id){ if(confirm('删除？')){ db.child(id).remove(); myPosts=myPosts.filter(p=>p!==id); localStorage.setItem('myPosts',JSON.stringify(myPosts)); }}
    function adminLogin(){ if(prompt("密码")==="admin123") isAdmin=true; }

    loadWishes();
  </script>
</body>
</html>
