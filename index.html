<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久星球</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0a0a1f] text-white p-6">
  <h1 class="text-4xl font-bold text-center mb-8">长久星球</h1>

  <div class="max-w-2xl mx-auto glass bg-white/10 backdrop-blur-2xl rounded-3xl p-6">
    <h2 class="text-xl mb-4">全部心愿（调试版）</h2>
    <div id="list" class="space-y-4"></div>
  </div>

  <script>
    firebase.initializeApp({ databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app" });
    const db = firebase.database().ref('longWishes');

    console.log("🚀 开始监听 longWishes...");

    db.on('value', (snap) => {
      console.log("📡 收到数据！总条数 =", snap.numChildren());
      let html = '';
      snap.forEach(child => {
        const v = child.val();
        html += `<div class="bg-white/10 p-5 rounded-2xl">
          <p>${v.text}</p>
          <div class="text-xs text-gray-400 mt-2">❤️ ${v.likes||0} · ${new Date(v.time).toLocaleString('zh-CN')}</div>
        </div>`;
      });
      document.getElementById('list').innerHTML = html || '<p class="text-center py-12 text-gray-400">没有数据</p>';
    });
  </script>
</body>
</html>
