<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久许愿墙</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
    .card { 
      background: rgba(255,255,255,0.08); 
      backdrop-filter: blur(20px);
      border: 1px solid rgba(168,85,247,0.3);
    }
  </style>
</head>
<body class="min-h-screen text-white p-6 pb-32">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-6xl font-bold text-center mb-12 tracking-wider">🌟 长久许愿墙 🌟</h1>
    <div id="wishList" class="space-y-8"></div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-slate-950/90 backdrop-blur-2xl border-t border-purple-500 p-6">
    <div class="max-w-2xl mx-auto">
      <textarea id="message" rows="3" class="w-full bg-white/5 border border-purple-400/50 rounded-3xl p-6 text-lg placeholder-gray-400 focus:outline-none focus:border-purple-400" placeholder="写下你的长久心愿..."></textarea>
      <button onclick="postWish()" class="mt-4 w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 py-6 rounded-3xl font-bold text-xl shadow-lg">✨ 许愿</button>
    </div>
  </div>

  <button onclick="adminLogin()" class="fixed bottom-6 right-6 bg-white/10 hover:bg-white/20 px-6 py-3 rounded-2xl text-sm">👑</button>

  <script>
    const firebaseConfig = { databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('longWishes');

    let isAdmin = false;
    let myPosts = JSON.parse(localStorage.getItem('myPosts') || '[]');
    let myLikes = JSON.parse(localStorage.getItem('myLikes') || '[]');

    function loadWishes() {
      db.orderByChild('likes').on('value', (snap) => {
        const wishes = [];
        snap.forEach(c => wishes.push({id: c.key, ...c.val()}));
        wishes.sort((a,b) => (b.likes||0) - (a.likes||0));

        let html = '';
        wishes.forEach(w => {
          const hasLiked = myLikes.includes(w.id);
          html += `
            <div class="card p-8 rounded-3xl">
              <p class="text-[${18 + Math.min((w.likes||0)*2, 32)}px] leading-relaxed mb-6">${w.text}</p>
              <div class="flex justify-between items-center text-sm">
                <button onclick="likeWish('${w.id}')" class="${hasLiked ? 'text-red-400' : 'text-pink-400'} flex items-center gap-2">
                  ❤️ <span>${w.likes || 0}</span>
                </button>
                <span class="text-gray-400">${new Date(w.time).toLocaleDateString('zh-CN')}</span>
                ${(myPosts.includes(w.id) || isAdmin) ? `<button onclick="deleteWish('${w.id}')" class="text-red-400 hover:text-red-500">删除</button>` : ''}
              </div>
            </div>`;
        });
        document.getElementById('wishList').innerHTML = html || '<p class="text-center text-gray-400 py-20">还没有心愿，快来写下第一条...</p>';
      });
    }

    function postWish() {
      const text = document.getElementById('message').value.trim();
      if (!text) return;
      const newPost = db.push({ text, time: Date.now(), likes: 0 });
      myPosts.push(newPost.key);
      localStorage.setItem('myPosts', JSON.stringify(myPosts));
      document.getElementById('message').value = '';
    }

    function likeWish(id) {
      if (myLikes.includes(id)) return;
      myLikes.push(id);
      localStorage.setItem('myLikes', JSON.stringify(myLikes));
      db.child(id).child('likes').transaction(v => (v || 0) + 1);
    }

    function deleteWish(id) {
      if (confirm('确定删除？')) {
        db.child(id).remove();
        myPosts = myPosts.filter(p => p !== id);
        myLikes = myLikes.filter(p => p !== id);
        localStorage.setItem('myPosts', JSON.stringify(myPosts));
        localStorage.setItem('myLikes', JSON.stringify(myLikes));
      }
    }

    function adminLogin() {
      if (prompt("管理员密码") === "admin123") isAdmin = true;
    }

    loadWishes();
  </script>
</body>
</html>
