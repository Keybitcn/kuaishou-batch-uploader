<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久星球</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0a0a1f] text-white p-6 min-h-screen">
  <h1 class="text-5xl font-bold text-center mb-8">长久星球</h1>
  <p class="text-center text-purple-300 mb-10">🌟 把心愿留在这里，长久陪伴</p>

  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-9">
      <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8">
        <h2 class="text-2xl mb-6">最新心愿</h2>
        <div id="latest" class="space-y-6"></div>
      </div>
    </div>
    <div class="lg:col-span-3">
      <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 sticky top-6">
        <h2 class="text-2xl mb-6">🔥 共鸣排行</h2>
        <div id="top" class="space-y-6"></div>
      </div>
    </div>
  </div>

  <div class="fixed bottom-4 left-4 right-4 max-w-4xl mx-auto bg-white/10 backdrop-blur-xl rounded-3xl p-6">
    <textarea id="msg" rows="3" class="w-full bg-transparent text-lg placeholder-gray-400" placeholder="写下你的长久心愿..."></textarea>
    <button onclick="send()" class="mt-4 w-full bg-gradient-to-r from-purple-500 to-pink-500 py-4 rounded-2xl font-bold">许下心愿</button>
  </div>

  <script>
    firebase.initializeApp({ databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app" });
    const db = firebase.database().ref('longWishes');

    db.on('value', snap => {
      let list = [];
      snap.forEach(c => list.push({id: c.key, ...c.val()}));

      document.getElementById('latest').innerHTML = list
        .sort((a,b) => b.time - a.time)
        .map(item => `<div class="bg-white/10 p-6 rounded-2xl"><p>${item.text}</p><div class="text-pink-400 mt-3">❤️ ${item.likes || 0}</div></div>`).join('');

      document.getElementById('top').innerHTML = list
        .sort((a,b) => (b.likes||0) - (a.likes||0))
        .slice(0,10)
        .map(item => `<div class="bg-white/10 p-6 rounded-2xl"><p>${item.text}</p><div class="text-pink-400 mt-3">❤️ ${item.likes || 0}</div></div>`).join('');
    });

    function send() {
      const t = document.getElementById('msg').value.trim();
      if(t) db.push({text:t, time:Date.now(), likes:0}), document.getElementById('msg').value = '';
    }
  </script>
</body>
</html>
