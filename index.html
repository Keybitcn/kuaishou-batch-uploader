<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>长久星球</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a1f, #1f1233); }
    .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.18); }
  </style>
</head>
<body class="min-h-screen text-white p-6 pb-40">
  <div class="max-w-7xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-bold bg-gradient-to-r from-purple-300 to-pink-300 bg-clip-text text-transparent">长久星球</h1>
        <p class="text-purple-300">🌟 把心愿留在这里，长久陪伴</p>
      </div>
      <button onclick="adminLogin()" class="glass px-6 py-2 rounded-2xl text-sm">👑 管理员</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-9">
        <div class="glass rounded-3xl p-6">
          <h2 class="text-2xl mb-6">最新心愿</h2>
          <div id="latestList" class="space-y-6"></div>
        </div>
      </div>
      <div class="lg:col-span-3">
        <div class="glass rounded-3xl p-6 sticky top-6">
          <h2 class="text-2xl mb-6">🔥 共鸣排行</h2>
          <div id="topList" class="space-y-6"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-black/90 p-6">
    <div class="max-w-4xl mx-auto glass rounded-3xl p-6">
      <textarea id="message" rows="3" class="w-full bg-transparent text-lg placeholder-gray-400 focus:outline-none" placeholder="写下你的长久心愿..."></textarea>
      <button onclick="postMessage()" class="mt-4 w-full bg-gradient-to-r from-purple-500 to-pink-500 py-4 rounded-2xl font-bold">许下心愿</button>
    </div>
  </div>

  <script>
    firebase.initializeApp({ databaseURL: "https://changjiu-9280f-default-rtdb.asia-southeast1.firebasedatabase.app" });
    const db = firebase.database().ref('longWishes');
    let isAdmin = false;

    function createCard(v) {
      const commentCount = v.comments ? Object.keys(v.comments).length : 0;
      let html = `
        <div class="glass rounded-3xl p-7">
          <p class="text-lg">${v.text}</p>
          <div class="mt-6 flex justify-between text-sm">
            <span class="text-pink-400">❤️ ${v.likes || 0}</span>
            <button onclick="toggleComments('${v.id}')" class="text-purple-400">💬 ${commentCount}</button>
            <span class="text-gray-400">${new Date(v.time || 0).toLocaleString('zh-CN')}</span>
          </div>
          <div id="comments-${v.id}" class="hidden mt-6 border-t border-white/10 pt-4"></div>`;
      if (isAdmin) html += `<button onclick="deleteWish('${v.id}')" class="mt-3 text-red-400 text-sm">删除</button>`;
      html += `</div>`;
      return html;
    }

    function loadData() {
      db.on('value', snap => {
        let list = [];
        snap.forEach(c => list.push({id: c.key, ...c.val()}));

        // 左侧最新（安全排序）
        document.getElementById('latestList').innerHTML = list
          .sort((a,b) => (b.time || 0) - (a.time || 0))
          .map(v => createCard(v)).join('');

        // 右侧排行
        document.getElementById('topList').innerHTML = list
          .sort((a,b) => (b.likes||0) - (a.likes||0))
          .slice(0,10)
          .map(v => createCard(v)).join('');
      });
    }

    window.toggleComments = function(id) {
      const container = document.getElementById(`comments-${id}`);
      if (container.classList.contains('hidden')) {
        container.classList.remove('hidden');
        container.innerHTML = `<div id="comment-list-${id}" class="space-y-3 mb-4"></div><div class="flex gap-2"><input id="reply-${id}" class="flex-1 bg-white/10 border border-white/20 rounded-2xl px-4 py-2 text-sm" placeholder="回复..."><button onclick="postComment('${id}')" class="bg-purple-500 px-5 rounded-2xl text-sm">回复</button></div>`;
        loadComments(id);
      } else {
        container.classList.add('hidden');
      }
    };

    function loadComments(id) {
      firebase.database().ref(`longWishes/${id}/comments`).on('value', snap => {
        const el = document.getElementById(`comment-list-${id}`);
        if (!el) return;
        let html = '';
        snap.forEach(c => html += `<div class="bg-white/5 p-3 rounded-2xl text-sm">${c.val().text}</div>`);
        el.innerHTML = html || '<p class="text-gray-400 text-xs text-center py-2">还没有回复</p>';
      });
    }

    window.postComment = function(id) {
      const input = document.getElementById(`reply-${id}`);
      const text = input.value.trim();
      if (!text) return;
      firebase.database().ref(`longWishes/${id}/comments`).push({text, time: Date.now()});
      input.value = '';
    };

    function postMessage() {
      const text = document.getElementById('message').value.trim();
      if (!text) return;
      db.push({ text, time: Date.now(), likes: 0 });
      document.getElementById('message').value = '';
    }

    window.deleteWish = function(id) {
      if (!isAdmin || !confirm('确定删除？')) return;
      db.child(id).remove();
    };

    function adminLogin() {
      const pass = prompt('管理员密码');
      if (pass === 'admin123') {
        isAdmin = true;
        alert('管理员登录成功');
        loadData();
      } else alert('密码错误');
    }

    loadData();
  </script>
</body>
</html>
